<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Legal Doc Analyzer{% endblock %}</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            font-family: 'Georgia', serif;
            background: #f8f5ef;
            color: #1c2b4a;
            min-height: 100vh;
        }
        nav {
            background: #1c2b4a;
            padding: 1rem 2rem;
            color: #c9a84c;
            font-size: 1.1rem;
            font-weight: bold;
            letter-spacing: 0.05em;
        }
        .container {
            max-width: 860px;
            margin: 3rem auto;
            padding: 0 1.5rem;
        }
        h1 {
            font-size: 2rem;
            color: #1c2b4a;
            margin-bottom: 0.5rem;
        }
        h2 {
            font-size: 1.2rem;
            color: #c9a84c;
            text-transform: uppercase;
            letter-spacing: 0.08em;
            margin: 2rem 0 0.75rem;
            border-bottom: 2px solid #c9a84c;
            padding-bottom: 0.3rem;
        }
        p { line-height: 1.7; margin-bottom: 1rem; }
        ul { list-style: none; padding: 0; }
        ul li {
            padding: 0.5rem 0.75rem;
            margin-bottom: 0.4rem;
            background: white;
            border-left: 3px solid #c9a84c;
            border-radius: 4px;
            font-size: 0.95rem;
        }
        .card {
            background: white;
            border-radius: 10px;
            padding: 1.5rem;
            margin-bottom: 1.5rem;
            box-shadow: 0 2px 12px rgba(0,0,0,0.06);
        }
        .btn {
            display: inline-block;
            background: #1c2b4a;
            color: white;
            padding: 0.75rem 1.5rem;
            border-radius: 6px;
            text-decoration: none;
            font-size: 0.9rem;
            margin-top: 1rem;
            border: none;
            cursor: pointer;
        }
        .btn:hover { background: #c9a84c; color: #1c2b4a; }
        .ai-content { line-height: 1.8; }
        .ai-content h1, .ai-content h2, .ai-content h3 {
            color: #1c2b4a;
            margin: 1.2rem 0 0.5rem;
            font-size: 1rem;
            text-transform: none;
            letter-spacing: 0;
            border: none;
            padding: 0;
        }
        .ai-content table {
            width: 100%;
            border-collapse: collapse;
            margin: 1rem 0;
        }
        .ai-content th {
            background: #1c2b4a;
            color: #c9a84c;
            padding: 0.5rem 0.75rem;
            text-align: left;
            font-size: 0.85rem;
        }
        .ai-content td {
            padding: 0.5rem 0.75rem;
            border-bottom: 1px solid #f0ebe0;
            font-size: 0.9rem;
        }
        .ai-content tr:nth-child(even) { background: #f8f5ef; }
        .ai-content blockquote {
            border-left: 3px solid #c9a84c;
            padding: 0.5rem 1rem;
            margin: 1rem 0;
            color: #6b7280;
            font-style: italic;
        }
        .ai-content strong { color: #1c2b4a; }
        .ai-content hr { border: none; border-top: 1px solid #e5dfd0; margin: 1rem 0; }
        .keyword-grid {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
        }
        .keyword {
            background: #1c2b4a;
            color: #c9a84c;
            padding: 4px 12px;
            border-radius: 20px;
            font-size: 0.85rem;
            letter-spacing: 0.03em;
        }
    </style>
</head>
<body>
    <nav>Legal Doc Analyzer — Muna Aden</nav>
    <div class="container">
        {% block content %}{% endblock %}
    </div>
</body>
</html>
